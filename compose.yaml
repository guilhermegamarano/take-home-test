name: fundo-loan-management

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SERVER_PASSWORD:?Set SQL_SERVER_PASSWORD in .env}
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - sql-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__LoansDatabase: Server=sql-server,1433;Database=LoanManagement;User Id=sa;Password=${SQL_SERVER_PASSWORD};Encrypt=True;TrustServerCertificate=True
      Database__ApplyMigrations: "true"
      Authentication__Issuer: Fundo.Loans.Api
      Authentication__Audience: Fundo.Loans.Client
      Authentication__SigningKey: ${JWT_SIGNING_KEY:?Set JWT_SIGNING_KEY in .env}
      Authentication__Username: ${APP_USERNAME:?Set APP_USERNAME in .env}
      Authentication__Password: ${APP_PASSWORD:?Set APP_PASSWORD in .env}
      Authentication__ReadOnlyUsername: ${APP_READONLY_USERNAME:-}
      Authentication__ReadOnlyPassword: ${APP_READONLY_PASSWORD:-}
      Authentication__TokenLifetimeMinutes: 30
      Cors__AllowedOrigins__0: http://localhost:8080
    depends_on:
      sql-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_UPSTREAM: http://api:8080
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  sql-data:
