name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  risk-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Scan for high-risk secret patterns
        run: |
          if git grep -nE 'BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{36,}|github_pat_[A-Za-z0-9_]{20,}' -- . ':!README.md'; then
            echo "Potential secret pattern found."
            exit 1
          fi

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: risk-review
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore backend/src/src.sln
      - run: dotnet format backend/src/src.sln --verify-no-changes --no-restore
      - run: dotnet build backend/src/src.sln --configuration Release --no-restore
      - run: dotnet test backend/src/src.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
      - shell: pwsh
        run: backend/src/coverage-gate.ps1 -SearchRoot backend/src -MinimumLineCoverage 90
      - run: dotnet list backend/src/src.sln package --vulnerable --include-transitive

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: risk-review
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage
      - run: npm run build
      - run: npm audit --audit-level=moderate

  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend, frontend]
    env:
      SQL_SERVER_PASSWORD: CiOnlyPassword!123
      JWT_SIGNING_KEY: ci-only-signing-key-with-at-least-32-characters
      APP_USERNAME: reviewer
      APP_PASSWORD: ci-only-application-password
      APP_READONLY_USERNAME: auditor
      APP_READONLY_PASSWORD: ci-only-readonly-password
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      - run: docker compose up --detach --wait
      - name: Verify authenticated loan operations
        run: |
          token=$(curl --fail --silent \
            --header "Content-Type: application/json" \
            --data '{"username":"reviewer","password":"ci-only-application-password"}' \
            http://localhost:8080/api/auth/token \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['accessToken'])")
          curl --fail --silent \
            --header "Authorization: Bearer $token" \
            "http://localhost:8080/api/loans?page=1&pageSize=2&status=active"
          readonly_token=$(curl --fail --silent \
            --header "Content-Type: application/json" \
            --data '{"username":"auditor","password":"ci-only-readonly-password"}' \
            http://localhost:8080/api/auth/token \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['accessToken'])")
          readonly_status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --header "Authorization: Bearer $readonly_token" \
            --header "Content-Type: application/json" \
            --data '{"amount":10000,"applicantName":"Read Only CI","type":"small-business"}' \
            http://localhost:8080/api/loans)
          test "$readonly_status" = "403"
          curl --fail --silent \
            --cookie-jar cookies.txt \
            --header "Content-Type: application/json" \
            --header "X-Requested-With: XMLHttpRequest" \
            --data '{"username":"reviewer","password":"ci-only-application-password"}' \
            http://localhost:8080/api/auth/session
          blocked_status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --cookie cookies.txt \
            --header "Content-Type: application/json" \
            --data '{"amount":10000,"applicantName":"Blocked CI Write","type":"small-business"}' \
            http://localhost:8080/api/loans)
          test "$blocked_status" = "403"
          created=$(curl --fail --silent \
            --cookie cookies.txt \
            --header "Content-Type: application/json" \
            --header "X-Requested-With: XMLHttpRequest" \
            --data '{"amount":10000,"applicantName":"CI Smoke","type":"small-business"}' \
            http://localhost:8080/api/loans)
          loan_id=$(printf '%s' "$created" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          curl --fail --silent \
            --cookie cookies.txt \
            "http://localhost:8080/api/loans/$loan_id"
          curl --fail --silent \
            --cookie cookies.txt \
            --header "Content-Type: application/json" \
            --header "X-Requested-With: XMLHttpRequest" \
            --data '{"amount":100}' \
            "http://localhost:8080/api/loans/$loan_id/payment"
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes

  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: container-smoke
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment:
      name: preview
    env:
      DEPLOY_TARGET_URL: ${{ secrets.DEPLOY_TARGET_URL }}
      SQL_SERVER_PASSWORD: PreviewOnlyPassword!123
      JWT_SIGNING_KEY: preview-only-signing-key-with-at-least-32-characters
      APP_USERNAME: reviewer
      APP_PASSWORD: preview-only-application-password
      APP_READONLY_USERNAME: auditor
      APP_READONLY_PASSWORD: preview-only-readonly-password
    steps:
      - uses: actions/checkout@v4
      - name: Render deployment manifest
        run: docker compose config > compose.rendered.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: compose-rendered-preview
          path: compose.rendered.yaml
      - name: Deployment summary
        run: |
          {
            echo "## Preview deployment"
            echo ""
            echo "- Compose manifest rendered successfully."
            echo "- Backend, frontend and SQL Server smoke tests passed before this stage."
            echo "- Configure DEPLOY_TARGET_URL in the protected preview environment to attach a real target."
          } >> "$GITHUB_STEP_SUMMARY"
